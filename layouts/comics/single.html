{{ define "main" }}
<article class="comic-chapter">
  <h1>{{ .Title }}</h1>
  <div class="comic-pages">
    {{ range .Resources.ByType "image" }}
    {{ if ne .Name "cover.png" }}
    <img src="{{ .RelPermalink }}" alt="{{ .Name }}" class="comic-page">
    {{ end }}
    {{ end }}
  </div>
  <nav class="chapter-nav">
    {{ with .PrevInSection }}
    <a href="{{ .Permalink }}" class="chapter-nav-btn">← {{ .Title }}</a>
    {{ end }}
    <a href="{{ "/comics/" | relURL }}" class="chapter-nav-btn">Index</a>
    {{ with .NextInSection }}
    <a href="{{ .Permalink }}" class="chapter-nav-btn">{{ .Title }} →</a>
    {{ end }}
  </nav>
</article>
{{ end }}
